# Example model-candidate shortlist (Stage 2B) — PLANNING TEMPLATE, NOT EVIDENCE.
#
# This mirrors docs/MODEL_SELECTION.md. It is a planning artifact, NOT experimental evidence
# and NOT a final selection. Sizes/licenses/gated flags were checked via Hugging Face
# *metadata only* (no weights downloaded) on 2026-06-20. No model is downloaded, and no final
# model is chosen, until explicitly approved (ADR-0101). Never store tokens here (ADR-0003).

version = "1.0.0"
is_example = true                      # planning/example config — NOT experimental evidence
selection_finalized = false           # no final model is committed in Stage 2B
planning_approved = true              # lead-approved at PLANNING level only...
download_approved = false             # ...weight download is a separate gate (T2.6 / ADR-0101).
                                      # Stage 4B (ADR-0018): Qwen2-7B DEFERRED — AirLLM CPU blocked;
                                      # runnable path is HF Transformers CPU on Qwen2-0.5B.
metadata_checked = "huggingface_hub metadata only; no weights downloaded"

[[candidate]]
role = "tiny_smoke"
candidate_model_id = "Qwen/Qwen2-0.5B"
family = "qwen2"                        # AirLLM class: AirLLMQWen2
estimated_size_gb = 1.0                 # metadata-verified
expected_format = "safetensors"
license_status = "apache-2.0"
access_status = "public-ungated-no-token"
decision_status = "RECOMMENDED_FOR_VERIFICATION"
verification_needed = "on-disk size; Stage 3 CPU smoke run"

[[candidate]]
role = "main_airllm"
candidate_model_id = "Qwen/Qwen2-7B"
